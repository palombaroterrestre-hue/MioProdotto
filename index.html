<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MioProdotto - Cerca Prodotti</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-elevated: #1c1c1c;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --text-muted: #888888;
            --accent: #e85d04;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(ellipse at 20% 0%, rgba(232,93,4,0.08) 0%, transparent 50%);
        }
        
        .container { max-width: 640px; margin: 0 auto; }
        
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; text-align: center; margin-bottom: 32px; }
        .logo span { color: var(--accent); }
        
        .search-wrapper { position: relative; margin-bottom: 24px; }
        
        #search {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
        }
        
        #search:focus { border-color: var(--accent); }
        
        .results { display: flex; flex-direction: column; gap: 8px; }
        
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-card:hover { border-color: var(--accent); }
        
        .result-main { flex: 1; }
        .result-name { font-size: 14px; font-weight: 500; }
        .result-alias { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .result-alias span { color: var(--accent); }
        
        .result-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .result-category { font-size: 11px; padding: 2px 8px; background: rgba(232,93,4,0.2); color: var(--accent); border-radius: 10px; }
        .result-score { font-size: 11px; color: var(--text-muted); }
        
        .hint, .no-results { text-align: center; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Mio<span>Prodotto</span></div>
        <div class="search-wrapper">
            <input type="text" id="search" placeholder="Cerca (es. MAIONESE, YOGURT, CAFFE)...">
        </div>
        <p class="hint" id="hint">Caricamento...</p>
        <div class="results" id="results"></div>
    </div>

    <script>
const SUPABASE_URL = 'https://fsxctxzzifohmbgqwcxk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzeGN0eHp6aWZvaG1iZ3F3Y3hrIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTczNzI1MCwiZXhwIjoyMDkxMzEzMjUwfQ.X7DudvCF90BkSPNny0AblDI_te-vcP3KlVprjIXSBCw';

let products = [];

async function loadProducts() {
    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/product_aliases?select=*', {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        products = await res.json();
        products = products.map(p => ({
            alias: p.alias_name,
            canonical: p.canonical_name,
            score: p.similarity_score,
            cat: p.category
        }));
        document.getElementById('hint').textContent = 'Scrivi per cercare i prodotti';
    } catch (e) {
        console.error('Failed to load products:', e);
    }
}

const search = document.getElementById('search');
const results = document.getElementById('results');

loadProducts();

function render(list) {
    if (list.length === 0) {
        results.innerHTML = '<p class="no-results">Nessun risultato</p>';
        return;
    }
    results.innerHTML = list.map(p => {
        const showAlias = p.alias !== p.canonical;
        return `
        <div class="result-card">
            <div class="result-main">
                <div class="result-name">${p.canonical}</div>
                ${showAlias ? `<div class="result-alias">Alias: <span>${p.alias}</span></div>` : ''}
            </div>
            <div class="result-meta">
                <span class="result-category">${p.cat}</span>
                <span class="result-score">${Math.round(p.score*100)}%</span>
            </div>
        </div>
    `}).join('');
}

search.addEventListener('input', e => {
    if (products.length === 0) return;
    const q = e.target.value.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (q.length < 2) {
        results.innerHTML = '';
        return;
    }
    const filtered = products.filter(p => 
        p.alias.toUpperCase().includes(q) || 
        p.canonical.toUpperCase().includes(q) ||
        p.cat.toUpperCase().includes(q)
    );
    render(filtered);
});
    </script>
</body>
</html>
