    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-elevated: #1c1c1c;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --text-muted: #888888;
            --accent: #e85d04;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: radial-gradient(ellipse at 20% 0%, rgba(232,93,4,0.08) 0%, transparent 50%);
        }
        
        .container { max-width: 640px; margin: 0 auto; }
        
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; text-align: center; margin-bottom: 32px; }
        .logo span { color: var(--accent); }
        
        .search-wrapper { position: relative; margin-bottom: 24px; }
        
        #search {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
        }
        
        #search:focus { border-color: var(--accent); }
        
        .results { display: flex; flex-direction: column; gap: 8px; }
        
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .result-card:hover { border-color: var(--accent); }
        .result-name { font-size: 14px; font-weight: 500; }
        .result-meta { display: flex; gap: 8px; align-items: center; }
        .result-category { font-size: 11px; padding: 2px 8px; background: rgba(232,93,4,0.2); color: var(--accent); border-radius: 10px; }
        .result-score { font-size: 11px; color: var(--text-muted); }
        
        .hint, .no-results { text-align: center; color: var(--text-muted); font-size: 14px; }
        .count { text-align: center; color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
    </style>
</head>

const search = document.getElementById('search');
const results = document.getElementById('results');

function render(list) {
    if (list.length === 0) {
        results.innerHTML = '<p class="no-results">Nessun risultato</p>';
        return;
    }
    results.innerHTML = list.map(p => `
        <div class="result-card">
            <div class="result-name">${p.alias}</div>
            <div class="result-meta">
                <span class="result-category">${p.cat}</span>
                <span class="result-score">${Math.round(p.score*100)}%</span>
            </div>
        </div>
    `).join('');
}

search.addEventListener('input', e => {
    const q = e.target.value.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (q.length < 2) {
        results.innerHTML = '';
        return;
    }
    const filtered = products.filter(p => 
        p.alias.toUpperCase().includes(q) || 
        p.canonical.toUpperCase().includes(q) ||
        p.cat.toUpperCase().includes(q)
    );
    render(filtered);
});
